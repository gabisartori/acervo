# Control input devices such as keyboards and Mice
# Add custom _sofiascript_ layout to XKB
env = XKB_CONFIG_ROOT,~/.config/xkb

  input {
    kb_layout = br
    kb_variant = abnt2
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        scroll_factor = 1.5
      }

    sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.
}

